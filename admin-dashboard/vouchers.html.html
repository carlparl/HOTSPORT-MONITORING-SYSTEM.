<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vouchers - HotSpot Pro</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Same sidebar as index.html -->
        <nav class="sidebar">...</nav>
        <main class="main-content">
            <h1>Voucher Management</h1>
            <p>Create and manage WiFi vouchers (UGX).</p>
            <button class="btn-create"><i class="fas fa-plus"></i> Generate Voucher</button>
            <table>
                <thead><tr><th>Code</th><th>Price</th><th>Duration</th><th>Status</th></tr></thead>
                <tbody>
                    <tr><td>0712ABC</td><td>UGX 1,000</td><td>24h</td><td>Active</td></tr>
                    <tr><td>0713DEF</td><td>UGX 500</td><td>4h</td><td>Used</td></tr>
                </tbody>
            </table>
        </main>
    </div>
</body>
</html>
